name: Deploy Frontend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/"
          target: "/opt/cdss-frontend/"
          strip_components: 1

      - name: Build, restart and verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/cdss-frontend
            echo "NEXT_PUBLIC_API_URL=${{ secrets.CDSS_API_URL }}" > .env
            docker compose up -d --build
            sleep 10
            curl -sf http://localhost:3006 || (echo "Health check failed" && exit 1)
